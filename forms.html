<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="" />
    <title>Odyssea/form</title>
    <link rel="stylesheet" href="styles.css" />

  <body>
    <header>
        <div class="logo">Odyssea</div>
        <nav>
            <a href="#">Accueil</a>
            <a href="#">Voyages</a>
            <a href="#">Connexion</a>
            <a href="forms.html" target="_blank">Inscription</a>
            <a href="#">Connexion</a>
        </nav>
    </header>
    <main>
        <form class="form-inscription">
          <h2>Inscription</h2>
          <div>
            <label for="name">Nom:</label>
            <input type="text" id="name" name="name" required />
          </div>
          <div>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required />
          </div>
          <div>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required />
          </div>
          <div>
             <label for="demand-password">mot de passe:</label>
            <input type="password" id="demand-password" name="demand-password" required />
          </div>
          <div>
            <label for="confirm-password">Confirmer le mot de passe:</label>
            <input type="password" id="confirm-password" name="confirm-password" required />
          </div>
          <button class="btn-primary">Submit form</button>
        </form>
    </main>
    <footer>

    </footer>
  </body>
</html>
